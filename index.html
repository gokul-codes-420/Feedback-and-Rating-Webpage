<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Feedback Experience</title>
    <link rel="stylesheet" href="feedback.css">
</head>
<body>

<main class="container">
    <h2>Share Your Experience</h2>

    <section class="card">
        <form id="feedbackForm">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" placeholder="Enter your name">
                <div class="error" id="nameError"></div>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="name@company.com">
                <div class="error" id="emailError"></div>
            </div>

            <div class="form-group">
                <label>Overall Rating</label>
                <div class="star-rating" id="starRating">
                    <span class="star" data-value="1">★</span>
                    <span class="star" data-value="2">★</span>
                    <span class="star" data-value="3">★</span>
                    <span class="star" data-value="4">★</span>
                    <span class="star" data-value="5">★</span>
                </div>
                <select id="rating" style="display: none;">
                    <option value="">Select Rating</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                </select>
                <div class="error" id="ratingError"></div>
            </div>

            <div class="form-group">
                <label for="comments">Your Thoughts</label>
                <textarea id="comments" placeholder="Tell us what you liked or how we can improve..."></textarea>
                <div class="error" id="commentsError"></div>
            </div>

            <button type="submit">Submit Feedback</button>
        </form>

        <div class="stats-bar">
            <div class="avg-rating" id="averageRating">Average Rating: 0.00 / 5</div>
        </div>
    </section>

    <div class="feedback-list" id="feedbackList">
        <!-- Feedback items will be injected here -->
    </div>
</main>

<script src="feedback.js"></script>

</body>
</html>
